<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tasty Bites 🍔 — Order Food Online</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- ===== Header ===== -->
  <header class="header">
    <div class="logo">🍔 Tasty Bites</div>
    <div class="header-actions">
      <button id="theme-toggle" class="theme-toggle" title="Toggle dark mode">🌙</button>
      <button id="cart-toggle" class="cart-toggle">
        🛒 Cart <span id="cart-count" class="cart-count">0</span>
      </button>
    </div>
  </header>

  <!-- ===== Hero banner ===== -->
  <section class="hero">
    <h1>Delicious food, delivered fast</h1>
    <p>Order your favorites in just a few clicks.</p>
  </section>

  <!-- ===== Controls: search + categories ===== -->
  <section class="controls">
    <input type="text" id="search" class="search" placeholder="🔍 Search for a dish..." />
    <div class="categories" id="categories">
      <!-- Category buttons inserted by script.js -->
    </div>
  </section>

  <!-- ===== Menu ===== -->
  <main class="menu" id="menu">
    <div class="menu-grid" id="menu-grid">
      <!-- Food cards inserted by script.js -->
    </div>
    <p id="no-results" class="no-results" hidden>No dishes match your search 😕</p>
  </main>

  <!-- ===== Cart sidebar ===== -->
  <aside class="cart" id="cart">
    <div class="cart-header">
      <h2>Your Order</h2>
      <button id="cart-close" class="cart-close">✕</button>
    </div>
    <ul class="cart-items" id="cart-items">
      <li class="cart-empty">Your cart is empty 🛒</li>
    </ul>
    <div class="cart-footer">
      <div class="cart-total">Total: <span id="cart-total">$0.00</span></div>
      <button id="checkout-btn" class="place-order" disabled>Checkout</button>
    </div>
  </aside>

  <!-- ===== Checkout modal ===== -->
  <div class="modal" id="checkout-modal">
    <div class="modal-box">
      <div class="modal-header">
        <h2>Checkout</h2>
        <button id="modal-close" class="cart-close">✕</button>
      </div>
      <form id="checkout-form" class="checkout-form">
        <label>Full Name
          <input type="text" id="cust-name" required placeholder="manasa" />
        </label>
        <label>Phone Number
          <input type="tel" id="cust-phone" required placeholder="9876543210"
                 pattern="[0-9 +\-]{7,15}" title="Enter a valid phone number" />
        </label>
        <label>Delivery Address
          <textarea id="cust-address" required rows="3" placeholder="House no, street, city"></textarea>
        </label>
        <div class="order-summary" id="order-summary"></div>
        <button type="submit" class="place-order">Place Order ✅</button>
      </form>
    </div>
  </div>

  <div class="overlay" id="overlay"></div>

  <!-- ===== Order success toast ===== -->
  <div class="toast" id="toast" hidden></div>

  <footer class="footer">
    <p>Made with ❤️ by manasa · Tasty Bites Demo</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
